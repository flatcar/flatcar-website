<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
  <head>
    {{- partial "head.html" . -}}
    {{ partial "theme-mode.html" (dict "part" "head" "page" .) }}
  </head>
  <body>
    {{- partial "header.html" . -}}
    <main class="main job-posting-page">
        <article class="article">
        <div class="container">
            <div class="row">
                <div class="">
                {{ .Content }}
                </div>
            </div>
        </div>
        </article>
    </main>
    {{- partial "footer.html" . -}}
    {{ partial "theme-mode.html" (dict "part" "body" "page" .) }}
  </body>
</html>
