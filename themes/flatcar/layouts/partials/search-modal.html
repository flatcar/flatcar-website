<div id="search-wrapper" class="search-modal hidden"
     role="dialog" aria-modal="true" aria-label="Search documentation"
     data-search-version="{{ partial "docs/getcurrentversion" . }}">
  <div class="search-overlay"></div>
  <div class="search-container">
    <div class="search-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchbar" name="searchbar"
             placeholder="Search docs&hellip;"
             autocomplete="off"
             aria-autocomplete="list"
             aria-controls="searchresults"
             aria-describedby="search-instructions" />
      <kbd>Esc</kbd>
    </div>
    <span id="search-instructions" class="visually-hidden">
      Type to search. Use arrow keys to navigate results. Press Enter to open. Press Escape to close.
    </span>
    <div id="searchresults-header" class="searchresults-header" aria-live="polite"></div>
    <ul id="searchresults" role="listbox" aria-label="Search results"></ul>
  </div>
</div>
