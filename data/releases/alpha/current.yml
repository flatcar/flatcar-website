    \ #### Changes:\r\n \r\n - Add EROFS tools for containerd ([Flatcar#2047](https://github.com/flatcar/Flatcar/issues/2047))\r\
    \n - Enable VNC console serial logs on ARM64 QEMU/KVM instances ([flatcar/scripts#2359](https://github.com/flatcar/scripts/pull/2359))\r\
    \n - Reworked how the OEM partition is mounted at boot time so that Ignition no\
    \ longer has to handle this by itself, thereby requiring less patching. This should\
    \ not affect any existing usage, but it is a significant underlying change, so\
    \ it needs to be called out. Please report any unexpected issues. ([flatcar/script#3934](https://github.com/flatcar/scripts/pull/3934))\r\
    \n \r\n #### Updates:\r\n \r\n- Linux ([6.12.87](https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/tag/?h=v6.12.87)\
    \ (includes [6.12.86](https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/tag/?h=v6.12.86),\
    \ [6.12.85](https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/tag/?h=v6.12.85),\
