    \n- libpcap ([CVE-2025-11961](https://www.cve.org/CVERecord?id=CVE-2025-11961),\
    \ [CVE-2025-11964](https://www.cve.org/CVERecord?id=CVE-2025-11964))\r\n- libtasn1\
    \ ([CVE-2025-13151](https://www.cve.org/CVERecord?id=CVE-2025-13151))\r\n- libxslt\
