    \n\r\n\r\n#### Changes:\r\n\r\n- Add EROFS tools for containerd ([Flatcar#2047](https://github.com/flatcar/Flatcar/issues/2047))\r\
    \n- Added NVMe/TCP support, enabling storage backends that use NVMe over Fabrics.\
    \ ([scripts#4036](https://github.com/flatcar/scripts/pull/4036))\r\n- Build AMD\
    \ GPU driver as module ([scripts#3461](https://github.com/flatcar/scripts/pull/3461))\r\
    \n- Enable VNC console serial logs on ARM64 QEMU/KVM instances ([scripts#2359](https://github.com/flatcar/scripts/pull/2359))\r\
    \n- Reworked how the OEM partition is mounted at boot time so that Ignition no\
    \ longer has to handle this by itself, thereby requiring less patching. This should\
    \ not affect any existing usage, but it is a significant underlying change, so\
    \ it needs to be called out. Please report any unexpected issues. ([script#3934](https://github.com/flatcar/scripts/pull/3934))\r\
    \n- Enabled `/dev/kfd/` in amdgpu driver on AMD64 ([scripts#4053](https://github.com/flatcar/scripts/pull/4053))\r\
